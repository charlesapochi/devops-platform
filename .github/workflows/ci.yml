name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies (Auth Service)
        run: |
          cd services/auth-service
          npm install

      - name: Run tests (Auth Service)
        run: |
          cd services/auth-service
          npm run test --if-present

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Auth Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service ./services/auth-service
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service

      - name: Build and push API Gateway
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway ./services/api-gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway