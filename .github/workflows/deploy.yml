name: Full CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # PHASE 1: PROVISIONING
  terraform:
    name: "Provision Infrastructure"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # PHASE 2: BUILD & DEPLOY
  build-and-deploy:
    name: "Build and Deploy Services"
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- TEST ---
      - name: Run Tests
        run: |
          cd services/auth-service && npm install && npm test --if-present
          cd ../api-gateway && npm install && npm test --if-present

      # --- DOCKER ---
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }} ./services/auth-service
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }}
          
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }} ./services/api-gateway
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}

      # --- KUBERNETES ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name my-cluster-name

      - name: Deploy Auth Service
        run: |
          sed -i "s|${{ secrets.DOCKER_USERNAME }}/auth-service:latest|${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }}|g" k8s/auth-deployment.yml
          kubectl apply -f k8s/auth-deployment.yml

      - name: Deploy API Gateway
        run: |
          sed -i "s|${{ secrets.DOCKER_USERNAME }}/api-gateway:latest|${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.sha }}|g" k8s/gateway-deployment.yml
          kubectl apply -f k8s/gateway-deployment.yml

      - name: Verify Rollouts
        run: |
          kubectl rollout status deployment/auth-service
          kubectl rollout status deployment/api-gateway