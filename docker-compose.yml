
services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "3000:3000"
    env_file:
      - ./services/auth-service/.env
    depends_on:
      - postgres

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=supersecret
    depends_on:
      - auth-service

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"